# ── Analitics — Reverse Proxy Config ────────────────────────
# Copy to: ~/reverse-proxy/conf.d/analitics.conf
# Replace analitics.example.com with your actual domain
# Ensure SSL certs are set up (certbot or manual)

server {
    listen 80;
    server_name analitics.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name analitics.example.com;

    # SSL certificates — adjust paths to your setup
    ssl_certificate     /etc/letsencrypt/live/analitics.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analitics.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Must match client_max_body_size in frontend/nginx.conf (upload limit)
    client_max_body_size 50M;

    # Proxy to Docker web container (nginx serving frontend + proxying /api)
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
    }
}
